<div class="page">

  <mat-card class="config">
    <mat-card-header>
      <mat-card-title>Configuración</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <app-node-config-host />
    </mat-card-content>
    <mat-card-actions>

    </mat-card-actions>
  </mat-card>
</div>
